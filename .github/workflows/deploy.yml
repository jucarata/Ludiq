name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      - name: Prepare Pages artifact
        run: touch out/.nojekyll

      - name: Verify Pages artifact
        run: |
          test -f out/index.html || { echo "::error::Missing out/index.html"; ls -laR out; exit 1; }
          echo "Pages artifact is valid ($(find out -type f | wc -l) files)"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: out
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    steps:
      # Pages allows only one deployment in flight. A cancelled run or a transient
      # backend error can leave the next deploy failing immediately — retry after
      # a short wait usually clears it.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true
        with:
          timeout: 600000

      - name: Wait for in-flight deployment to settle
        if: steps.deployment.outcome == 'failure'
        run: sleep 90

      - name: Deploy to GitHub Pages (retry)
        if: steps.deployment.outcome == 'failure'
        id: deployment-retry
        uses: actions/deploy-pages@v5
        with:
          timeout: 600000
